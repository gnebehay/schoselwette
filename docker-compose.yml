services:

  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-gnebehay@gmail.com}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik-network

  schosel-backend:
    image: gnebehay/schoselwette:latest
    restart: unless-stopped
    volumes:
      - /home/georg/data:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.schosel-backend_insecure.rule: "Host(\"schosel.net\") || Host(\"www.schosel.net\") && PathPrefix(`/api`)"
      traefik.http.routers.schosel-backend_insecure.middlewares: redirect-to-https
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
      traefik.http.routers.schosel-backend.rule: "(Host(\"schosel.net\") || Host(\"www.schosel.net\")) && PathPrefix(`/api`)"
      traefik.http.routers.schosel-backend.tls: "true"
      traefik.http.routers.schosel-backend.tls.certresolver: myresolver
      traefik.http.services.schosel-backend.loadbalancer.server.port: "8000"
    environment:
      SQLALCHEMY_DATABASE_URI: "sqlite:////app/data/app.db"
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY}
    networks:
      - traefik-network
    build: .

  schosel-frontend:
    image: nginx:stable
    restart: unless-stopped
    volumes:
      - ${SCHOSEL_HTML:-/home/georg/deploy/schosel-frontend/dist}:/usr/share/nginx/html:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.schosel-frontend_insecure.rule: "Host(\"schosel.net\") || Host(\"www.schosel.net\")"
      traefik.http.routers.schosel-frontend_insecure.middlewares: redirect-to-https
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
      traefik.http.routers.schosel-frontend.rule: "Host(\"schosel.net\") || Host(\"www.schosel.net\")"
      traefik.http.routers.schosel-frontend.tls: "true"
      traefik.http.routers.schosel-frontend.tls.certresolver: myresolver
      traefik.http.services.schosel-frontend.loadbalancer.server.port: "80"
    networks:
      - traefik-network

networks:
  traefik-network:
    driver: bridge
